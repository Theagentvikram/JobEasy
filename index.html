<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description"
    content="JobEasy is an AI career workspace to build ATS-ready resumes, improve keyword match, track applications and referrals, and move faster in your job search." />
  <meta name="theme-color" content="#0f766e" />
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />

  <link rel="canonical" href="https://www.jobeasy.app/" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <title>JobEasy | AI Resume Builder, ATS Scanner and Job Tracker</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="JobEasy" />
  <meta property="og:url" content="https://www.jobeasy.app/" />
  <meta property="og:title" content="JobEasy | AI Resume Builder, ATS Scanner and Job Tracker" />
  <meta property="og:description"
    content="Build ATS-ready resumes, improve ATS match, and organize applications and referrals in one AI career workspace." />
  <meta property="og:image" content="https://www.jobeasy.app/og-image.png" />
  <meta property="og:image:secure_url" content="https://www.jobeasy.app/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="JobEasy branding banner" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="JobEasy | AI Resume Builder, ATS Scanner and Job Tracker" />
  <meta name="twitter:description"
    content="Build ATS-ready resumes, optimize ATS scores, and manage your full job search workflow in one place." />
  <meta name="twitter:image" content="https://www.jobeasy.app/og-image.png" />
  <meta name="twitter:image:alt" content="JobEasy branding banner" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "JobEasy",
      "url": "https://www.jobeasy.app/",
      "logo": "https://www.jobeasy.app/favicon.png",
      "description": "JobEasy is an AI career workspace for resume building, ATS optimization, and job tracking."
    }
  </script>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "JobEasy",
      "url": "https://www.jobeasy.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.jobeasy.app/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
  <!-- UI switcher: redirect to /new/ if user has chosen the new UI -->
  <script>
    if (localStorage.getItem('jobeasy_ui') === 'new') {
      window.location.replace('/new/');
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
